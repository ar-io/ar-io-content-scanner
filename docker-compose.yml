services:
  content-scanner:
    build: .
    container_name: content-scanner
    ports:
      - "3100:3100"
    environment:
      GATEWAY_URL: "${GATEWAY_URL:-http://core:4000}"
      ADMIN_API_KEY: "${ADMIN_API_KEY}"
      SCANNER_ADMIN_KEY: "${SCANNER_ADMIN_KEY}"
      SCANNER_MODE: "${SCANNER_MODE:-dry-run}"
      SCANNER_WORKERS: "${SCANNER_WORKERS:-2}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      GATEWAY_PUBLIC_URL: "${GATEWAY_PUBLIC_URL:-}"
      ML_MODEL_ENABLED: "true"
      VERDICT_API_KEY: "${VERDICT_API_KEY:-}"
      VERDICT_FEED_URLS: "${VERDICT_FEED_URLS:-}"
      VERDICT_FEED_POLL_INTERVAL: "${VERDICT_FEED_POLL_INTERVAL:-300}"
      VERDICT_FEED_TRUST_MODE: "${VERDICT_FEED_TRUST_MODE:-malicious_only}"
      VERDICT_FEED_ON_DEMAND: "${VERDICT_FEED_ON_DEMAND:-true}"
      VERDICT_FEED_REQUEST_TIMEOUT_MS: "${VERDICT_FEED_REQUEST_TIMEOUT_MS:-5000}"
      SAFE_BROWSING_API_KEY: "${SAFE_BROWSING_API_KEY:-}"
      SAFE_BROWSING_CHECK_INTERVAL: "${SAFE_BROWSING_CHECK_INTERVAL:-300}"
      BACKFILL_ENABLED: "${BACKFILL_ENABLED:-false}"
      BACKFILL_DATA_PATH: "${BACKFILL_DATA_PATH:-}"
      BACKFILL_GATEWAY_DB_PATH: "${BACKFILL_GATEWAY_DB_PATH:-}"
      BACKFILL_RATE: "${BACKFILL_RATE:-5}"
      BACKFILL_INTERVAL_HOURS: "${BACKFILL_INTERVAL_HOURS:-24}"
    volumes:
      - scanner-data:/app/data
      # Backfill volumes: adjust these paths to match your gateway's data locations
      - ${GATEWAY_CONTIGUOUS_DATA_PATH:-/data/contiguous}:/gateway-data/contiguous:ro
      - ${GATEWAY_SQLITE_PATH:-/programs/ar-io-node/data/sqlite}:/gateway-data/sqlite:ro
    restart: unless-stopped
    networks:
      - ar-io-network

volumes:
  scanner-data:

networks:
  ar-io-network:
    external: true
    name: ${DOCKER_NETWORK_NAME:-ar-io-network}
