services:
  content-scanner:
    build: .
    ports:
      - "3100:3100"
    environment:
      GATEWAY_URL: "http://core:4000"
      ADMIN_API_KEY: "${ADMIN_API_KEY}"
      SCANNER_MODE: "dry-run"    # "enforce" to auto-block
      SCANNER_WORKERS: "2"
      LOG_LEVEL: "info"
    volumes:
      - scanner-data:/app/data
    restart: unless-stopped
    networks:
      - ar-io-network

volumes:
  scanner-data:

networks:
  ar-io-network:
    external: true
    name: ${DOCKER_NETWORK_NAME:-ar-io-network}
