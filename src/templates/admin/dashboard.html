<!-- Dashboard Tab -->
<div x-data="dashboardTab" x-init="init()">
  <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
    <h2 style="margin: 0;">Dashboard</h2>
    <div style="display: flex; gap: 12px; align-items: center;">
      <span style="font-size: 0.75rem; color: var(--color-gray);">Updated <span x-text="lastUpdatedAgo"></span></span>
      <button @click="autoRefresh = !autoRefresh" class="btn btn-sm" :class="autoRefresh ? 'btn-outline' : 'btn-primary'" style="font-size: 0.7rem; padding: 2px 10px;" :title="autoRefresh ? 'Pause auto-refresh' : 'Resume auto-refresh'">
        <span x-text="autoRefresh ? 'Auto-refresh ON' : 'Auto-refresh OFF'"></span>
      </button>
    </div>
  </div>

  <!-- Loading state -->
  <div x-show="loading" class="text-center" style="padding: 60px;">
    <div class="spinner" style="width: 32px; height: 32px;"></div>
  </div>

  <template x-if="error && !loading">
    <div class="error-banner">
      <span x-text="error"></span>
      <button @click="load()" class="btn btn-sm btn-outline">Retry</button>
    </div>
  </template>

  <template x-if="stats && !loading">
    <div>
      <!-- Safe Browsing domain warning -->
      <template x-if="stats.safe_browsing && stats.safe_browsing.enabled && stats.safe_browsing.domain_flagged">
        <div style="background: var(--color-red); color: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 12px; font-weight: 600; font-size: 0.9rem;">
          WARNING: Your gateway domain is flagged by Google Safe Browsing. Users may see browser warnings. Review and block flagged content immediately.
        </div>
      </template>

      <!-- Stats Cards -->
      <div class="grid-stats">
        <div class="stat-card">
          <div class="stat-number" style="color: var(--color-primary);" x-text="stats.counts.scans_total.toLocaleString()"></div>
          <div class="stat-label">Total Scans</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color: var(--color-red);" x-text="stats.counts.malicious.toLocaleString()"></div>
          <div class="stat-label">Malicious</div>
          <div class="stat-subtitle" x-text="threatRate"></div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color: var(--color-amber);" x-text="stats.counts.suspicious.toLocaleString()"></div>
          <div class="stat-label">Suspicious</div>
        </div>
        <div class="stat-card clickable" @click="$dispatch('switch-tab', 'review')">
          <div class="stat-number" style="color: var(--color-primary);" x-text="stats.counts.pending_review.toLocaleString()"></div>
          <div class="stat-label">Awaiting Review &rarr;</div>
        </div>
      </div>

      <!-- Verdict Breakdown -->
      <div class="verdict-bar-container" x-show="stats.counts.scans_total > 0">
        <div class="verdict-bar">
          <div class="verdict-bar-segment" :style="'width: ' + verdictBar.clean + '%; background: var(--color-green);'"></div>
          <div class="verdict-bar-segment" :style="'width: ' + verdictBar.suspicious + '%; background: var(--color-amber);'"></div>
          <div class="verdict-bar-segment" :style="'width: ' + verdictBar.malicious + '%; background: var(--color-red);'"></div>
        </div>
        <div class="verdict-bar-legend">
          <div class="verdict-bar-legend-item">
            <span class="verdict-bar-dot" style="background: var(--color-green);"></span>
            <span>Clean <strong x-text="verdictBar.cleanCount.toLocaleString()"></strong></span>
          </div>
          <div class="verdict-bar-legend-item">
            <span class="verdict-bar-dot" style="background: var(--color-amber);"></span>
            <span>Suspicious <strong x-text="verdictBar.suspiciousCount.toLocaleString()"></strong></span>
          </div>
          <div class="verdict-bar-legend-item">
            <span class="verdict-bar-dot" style="background: var(--color-red);"></span>
            <span>Malicious <strong x-text="verdictBar.maliciousCount.toLocaleString()"></strong></span>
          </div>
        </div>
      </div>

      <!-- Recent Detections -->
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h3 class="font-display" style="font-size: 1rem; margin: 0;">Recent Detections</h3>
          <button class="btn btn-sm btn-outline" @click="$dispatch('switch-tab', 'review')" style="font-size: 0.75rem;">View All &rarr;</button>
        </div>
        <template x-if="stats.recent_detections.length === 0">
          <div class="empty-state" style="padding: 32px;">
            <div class="empty-state-icon">&#128737;</div>
            <p class="empty-state-title">No detections yet</p>
            <p class="empty-state-text">Malicious and suspicious content will appear here as it's detected.</p>
          </div>
        </template>
        <template x-if="stats.recent_detections.length > 0">
          <div style="overflow-x: auto;">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>TX ID</th>
                  <th>Verdict</th>
                  <th>Rules</th>
                  <th>ML Score</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="d in stats.recent_detections" :key="d.content_hash">
                  <tr class="clickable" @click="$dispatch('switch-tab', 'review'); $dispatch('search-review', d.content_hash)">
                    <td x-text="formatTimestamp(d.scanned_at)" style="white-space: nowrap;"></td>
                    <td>
                      <template x-if="txUrl(d.tx_id)">
                        <a :href="txUrl(d.tx_id)" target="_blank" rel="noopener" class="mono" x-text="truncateId(d.tx_id, 20)" :title="d.tx_id" style="color: var(--color-primary); text-decoration: none;" @mouseover="$el.style.textDecoration='underline'" @mouseout="$el.style.textDecoration='none'" @click.stop></a>
                      </template>
                      <template x-if="!txUrl(d.tx_id)">
                        <span class="mono" x-text="truncateId(d.tx_id, 20)"></span>
                      </template>
                    </td>
                    <td><span :class="badgeClass(d.verdict)" x-text="d.verdict"></span></td>
                    <td>
                      <template x-for="r in parseRules(d.matched_rules)">
                        <span class="pill" x-text="r"></span>
                      </template>
                    </td>
                    <td>
                      <span x-text="d.ml_score !== null ? d.ml_score.toFixed(3) : '\u2014'"></span>
                      <template x-if="d.ml_score !== null">
                        <span class="score-bar">
                          <span class="score-bar-fill" :style="'width: ' + Math.min(d.ml_score * 100, 100) + '%; background: ' + scoreColor(d.ml_score)"></span>
                        </span>
                      </template>
                    </td>
                    <td>
                      <template x-if="d.admin_status === 'confirmed_malicious'"><span style="color: var(--color-red); font-weight: 600; font-size: 0.8rem;">Confirmed</span></template>
                      <template x-if="d.admin_status === 'confirmed_clean'"><span style="color: var(--color-green); font-weight: 600; font-size: 0.8rem;">Dismissed</span></template>
                      <template x-if="!d.admin_status"><span style="color: var(--color-amber); font-weight: 600; font-size: 0.8rem;">Pending</span></template>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>
      </div>

      <!-- System Health -->
      <div class="grid-auto">
        <!-- Scanner Health -->
        <div class="card">
          <h3 class="font-display" style="font-size: 1rem; margin: 0 0 16px;">Scanner Health</h3>
          <div class="grid-kv">
            <div style="color: var(--color-gray);">Uptime</div>
            <div style="font-weight: 600;" x-text="uptimeFormatted"></div>
            <div style="color: var(--color-gray);">Version</div>
            <div style="font-weight: 600;" x-text="stats.version"></div>
            <div style="color: var(--color-gray);">Queue Depth</div>
            <div style="font-weight: 600;" :style="stats.metrics.queue_depth > 10 ? 'color: var(--color-red)' : ''" x-text="stats.metrics.queue_depth"></div>
            <div style="color: var(--color-gray);">Workers</div>
            <div style="font-weight: 600;" x-text="stats.workers"></div>
            <div style="color: var(--color-gray);">Avg Scan Time</div>
            <div style="font-weight: 600;" x-text="stats.metrics.avg_scan_ms + ' ms'"></div>
            <div style="color: var(--color-gray);">Cache Hit Rate</div>
            <div style="font-weight: 600;">
              <span x-text="cacheHitRate"></span>
              <span class="inline-bar" x-show="cacheHitPercent > 0">
                <span class="inline-bar-fill" :style="'width: ' + cacheHitPercent + '%; background: ' + cacheBarColor"></span>
              </span>
            </div>
            <div style="color: var(--color-gray);">Blocks Sent</div>
            <div style="font-weight: 600;" x-text="stats.metrics.blocks_sent || 0"></div>
            <template x-if="stats.metrics.blocks_failed > 0">
              <div style="display: contents;">
                <div style="color: var(--color-gray);">Blocks Failed</div>
                <div style="font-weight: 600; color: var(--color-red);" x-text="stats.metrics.blocks_failed"></div>
              </div>
            </template>
            <div style="color: var(--color-gray);">Last Webhook</div>
            <div style="font-weight: 600;" :style="webhookStale ? 'color: var(--color-amber)' : ''" x-text="lastWebhookFormatted"></div>
          </div>
        </div>

        <!-- Verdict Feed Status (only shown when configured) -->
        <template x-if="stats.verdict_feed && stats.verdict_feed.enabled">
        <div class="card">
          <h3 class="font-display" style="font-size: 1rem; margin: 0 0 16px;">Verdict Feed</h3>
            <div class="grid-kv">
              <div style="color: var(--color-gray);">Peers</div>
              <div style="font-weight: 600;" x-text="stats.verdict_feed.peers ? stats.verdict_feed.peers.length : 0"></div>
              <div style="color: var(--color-gray);">Imported Verdicts</div>
              <div style="font-weight: 600;" x-text="stats.verdict_feed.import_stats ? stats.verdict_feed.import_stats.total_imported : 0"></div>
              <template x-for="peer in (stats.verdict_feed.peers || [])" :key="peer.peer_url">
                <template x-if="true">
                  <div style="display: contents;">
                    <div style="color: var(--color-gray); font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis;" x-text="peer.peer_url"></div>
                    <div style="font-size: 0.8rem;">
                      <span x-show="peer.consecutive_errors === 0" style="color: var(--color-green); font-weight: 600;">OK</span>
                      <span x-show="peer.consecutive_errors > 0" style="color: var(--color-red); font-weight: 600;" x-text="'Error (' + peer.consecutive_errors + ')'"></span>
                      <span style="color: var(--color-gray);"> &mdash; </span>
                      <span x-text="peer.imported_count + ' imported'"></span>
                    </div>
                  </div>
                </template>
              </template>
            </div>
        </div>
        </template>

        <!-- Backfill Status (only shown when configured) -->
        <template x-if="stats.backfill && stats.backfill.enabled">
        <div class="card">
          <h3 class="font-display" style="font-size: 1rem; margin: 0 0 16px;">Backfill Status</h3>
          <div class="grid-kv">
            <div style="color: var(--color-gray);">Status</div>
            <div style="font-weight: 600;" x-text="stats.backfill.sweeps_completed > 0 ? 'Complete' : 'In Progress'"></div>
            <div style="color: var(--color-gray);">Files Scanned</div>
            <div style="font-weight: 600;" x-text="stats.backfill.files_scanned.toLocaleString()"></div>
            <div style="color: var(--color-gray);">Malicious Found</div>
            <div style="font-weight: 600;" :style="stats.backfill.malicious_found > 0 ? 'color: var(--color-red)' : ''" x-text="stats.backfill.malicious_found"></div>
            <div style="color: var(--color-gray);">Sweeps Completed</div>
            <div style="font-weight: 600;" x-text="stats.backfill.sweeps_completed"></div>
            <div style="color: var(--color-gray);">Last Sweep</div>
            <div style="font-weight: 600;" x-text="formatTimestamp(stats.backfill.last_sweep_at)"></div>
          </div>
        </div>
        </template>

        <!-- Safe Browsing Status (only shown when configured) -->
        <template x-if="stats.safe_browsing && stats.safe_browsing.enabled">
        <div class="card">
          <h3 class="font-display" style="font-size: 1rem; margin: 0 0 16px;">Google Safe Browsing</h3>
          <div class="grid-kv">
            <div style="color: var(--color-gray);">Gateway Domain</div>
            <div style="font-weight: 600;">
              <span x-show="stats.safe_browsing.domain_flagged" style="color: var(--color-red);">FLAGGED</span>
              <span x-show="!stats.safe_browsing.domain_flagged && stats.safe_browsing.checks > 0" style="color: var(--color-green);">Clean</span>
              <span x-show="!stats.safe_browsing.domain_flagged && stats.safe_browsing.checks === 0" style="color: var(--color-gray);">Pending first check...</span>
            </div>
            <div style="color: var(--color-gray);">API Checks</div>
            <div style="font-weight: 600;" x-text="stats.safe_browsing.checks"></div>
            <div style="color: var(--color-gray);">URLs Flagged</div>
            <div style="font-weight: 600;" :style="stats.safe_browsing.flagged > 0 ? 'color: var(--color-red)' : ''" x-text="stats.safe_browsing.flagged"></div>
            <div style="color: var(--color-gray);">Escalations</div>
            <div style="font-weight: 600;" x-text="stats.safe_browsing.escalations"></div>
            <div style="color: var(--color-gray);">Check Interval</div>
            <div style="font-weight: 600;" x-text="stats.safe_browsing.check_interval + 's'"></div>
            <div style="color: var(--color-gray);">DB: Flagged</div>
            <div style="font-weight: 600;" :style="stats.safe_browsing.stats.flagged > 0 ? 'color: var(--color-red)' : ''" x-text="stats.safe_browsing.stats.flagged"></div>
            <div style="color: var(--color-gray);">DB: Unchecked</div>
            <div style="font-weight: 600;" x-text="stats.safe_browsing.stats.unchecked"></div>
          </div>
        </div>
        </template>
      </div>
    </div>
  </template>
</div>
